services:
  postgres:
    image: postgres:16
    container_name: barbershop-postgres
    environment:
      POSTGRES_DB: Barbershop
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Barbershop" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./MCPServer
    container_name: barbershop-mcp-server
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: ${POSTGRES_URL}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5


  mcp-client:
    build: ./MCPClient
    container_name: barbershop-mcp-client
    ports:
      - "8080:8080"
    depends_on:
      - mcp-server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SPRING_AI_MCP_CLIENT_SSE_CONNECTIONS_BARBER-MCP-SERVER_URL: http://mcp-server:8081
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: